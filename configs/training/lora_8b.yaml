model:
  base_model_path: path/to/local/8b/model
  model_family: other
  tokenizer_path: null
  trust_remote_code: false
  torch_dtype: auto
  device_map: auto
  max_seq_length: 2048
  use_flash_attention: false
  gradient_checkpointing: true
training:
  use_qlora: true
  load_in_4bit: true
  load_in_8bit: false
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none
  task_type: CAUSAL_LM
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  weight_decay: 0.0
  warmup_ratio: 0.03
  num_train_epochs: 1
  max_steps: null
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 2
  bf16: true
  fp16: false
  gradient_checkpointing: true
  max_grad_norm: 1.0
  seed: 2026
readiness:
  output_dir: outputs/paper_runs/protocol_v1/lora_8b/readiness
