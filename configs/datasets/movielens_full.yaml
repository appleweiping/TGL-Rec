dataset:
  name: movielens_full
  adapter: movielens_style
  split_strategy: leave_one_out
  candidate_protocol: fixed_shared_candidates
  seed: 0
  min_user_interactions: 3
  output_dir: outputs/processed/movielens_full
  required_interaction_columns: [user_id, item_id, timestamp, rating_or_interaction]
  required_item_columns: [item_id, text_field]
  paths:
    processed_dir: artifacts/datasets/movielens_1m
    raw_dir: data/raw/movielens_1m/ml-1m
readiness:
  allow_download: false
  output_path: outputs/launch/paper_v1/dataset_readiness/movielens_full_readiness.json
paper_artifacts:
  protocol_version: protocol_v1
  output_dir: outputs/artifacts/protocol_v1/movielens_full
  split_artifact: outputs/artifacts/protocol_v1/movielens_full/splits.jsonl
  candidate_artifact: outputs/artifacts/protocol_v1/movielens_full/candidates.jsonl
  split_protocol: leave_one_out
  candidate_protocol: full_catalog
  candidate_size: full
  candidate_scope: full_catalog
  seed: 0
