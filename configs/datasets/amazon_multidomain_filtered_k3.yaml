dataset:
  name: amazon_multidomain_filtered_k3
  adapter: generic_jsonl
  source_dataset: amazon_multidomain_full
  split_strategy: leave_one_out
  candidate_protocol: fixed_shared_candidates
  seed: 0
  min_user_interactions: 3
  min_item_interactions: 3
  output_dir: outputs/processed/amazon_multidomain_filtered_k3
  required_interaction_columns: [user_id, item_id, timestamp, rating_or_interaction, domain]
  required_item_columns: [item_id, text_field, domain]
  paths:
    source_interactions: data/raw/amazon_multidomain/interactions.jsonl
    source_items: data/raw/amazon_multidomain/items.jsonl
    interactions: data/processed/amazon_multidomain_filtered/k3/interactions.jsonl
    items: data/processed/amazon_multidomain_filtered/k3/items.jsonl
    filtering_report: data/processed/amazon_multidomain_filtered/filtering_report.json
    filtering_history_report: data/processed/amazon_multidomain_filtered/reports/k3_dry_run_report.json
    filtering_progress: data/processed/amazon_multidomain_filtered/filtering_progress.log
filtering:
  strategy: user_item_min_interactions
  user_min_interactions: 3
  item_min_interactions: 3
  overwrite_existing: false
readiness:
  allow_download: false
  output_path: outputs/launch/paper_v1/dataset_readiness/amazon_multidomain_filtered_k3_readiness.json
