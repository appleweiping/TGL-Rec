dataset:
  name: amazon_multidomain_filtered_iterative_k3
  adapter: generic_jsonl
  source_dataset: amazon_multidomain_full
  split_strategy: leave_one_out
  candidate_protocol: fixed_shared_candidates
  seed: 0
  min_user_interactions: 3
  min_item_interactions: 3
  filtered_output_dir: data/processed/amazon_multidomain_filtered
  output_dir: outputs/processed/amazon_multidomain_filtered_iterative_k3
  required_interaction_columns: [user_id, item_id, timestamp, rating_or_interaction, domain]
  required_item_columns: [item_id, text_field, domain]
  paths:
    source_interactions: data/raw/amazon_multidomain/interactions.jsonl
    source_items: data/raw/amazon_multidomain/items.jsonl
    source_conversion_report: data/raw/amazon_multidomain/conversion_report.json
    interactions: data/processed/amazon_multidomain_filtered/interactions.jsonl
    items: data/processed/amazon_multidomain_filtered/items.jsonl
    filtering_report: data/processed/amazon_multidomain_filtered/filtering_report.json
    filtering_history_report: data/processed/amazon_multidomain_filtered/reports/iterative_k3_report.json
    filtering_progress: data/processed/amazon_multidomain_filtered/filtering_progress.log
filtering:
  strategy: iterative_k_core
  user_min_interactions: 3
  item_min_interactions: 3
  max_iterations: 50
  overwrite_existing: false
readiness:
  allow_download: false
  output_path: outputs/launch/paper_v1/dataset_readiness/amazon_multidomain_filtered_iterative_k3_readiness.json
paper_artifacts:
  protocol_version: protocol_v1
  output_dir: outputs/artifacts/protocol_v1/amazon_multidomain_filtered_iterative_k3
  split_artifact: outputs/artifacts/protocol_v1/amazon_multidomain_filtered_iterative_k3/splits.jsonl
  candidate_artifact: outputs/artifacts/protocol_v1/amazon_multidomain_filtered_iterative_k3/candidates.jsonl
  candidate_pool_artifact: outputs/artifacts/protocol_v1/amazon_multidomain_filtered_iterative_k3/candidate_pool.json
  split_protocol: leave_one_out
  candidate_protocol: fixed_sampled
  candidate_storage: shared_pool
  candidate_size: 1000
  candidate_scope: global
  seed: 0
