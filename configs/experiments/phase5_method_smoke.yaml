manifest:
  dataset: tiny
  split_strategy: leave_one_out
  candidate_strategy: full_catalog
  methods: [configs/methods/time_graph_evidence.yaml]
  seeds: [2026]
  metrics: [Recall@1, Recall@3, NDCG@3, MRR@5, validity_rate, hallucination_rate]
  output_dir: outputs/runs
  run_mode: smoke
  reportable: false
experiment:
  run_id: phase5_method_smoke
  output_dir: outputs/runs
  overwrite: true
  run_mode: smoke
  seed: 2026
  reportable: false
dataset:
  config_path: configs/datasets/tiny.yaml
  preprocess: true
method:
  config_path: configs/methods/time_graph_evidence.yaml
evaluation:
  config_path: configs/evaluation/default.yaml
  ks: [1, 3, 5]
  candidate_protocol: full_catalog
llm:
  provider: none
  allow_api_calls: false
