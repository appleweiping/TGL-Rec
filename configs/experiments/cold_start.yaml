manifest:
  dataset: movielens
  split_strategy: temporal_leave_one_out
  candidate_strategy: fixed_sampled_negatives
  methods: [configs/baselines/popularity.yaml, configs/baselines/bm25.yaml, configs/baselines/mf.yaml]
  seeds: [2026, 2027, 2028]
  metrics: [Recall@5, NDCG@5, MRR@5, user_sparsity_segments]
  output_dir: outputs/runs/cold_start
  run_mode: planned
  reportable: false
