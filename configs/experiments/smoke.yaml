experiment:
  run_id: phase1_smoke
  output_dir: outputs/runs
  overwrite: true
  run_mode: smoke
  seed: 2026

dataset:
  config_path: configs/datasets/tiny.yaml
  preprocess: true

method:
  name: skeleton
  reportable: false
  eval_split: test
  note: Phase 1 deterministic skeleton ranker; not a formal baseline.

evaluation:
  config_path: configs/evaluation/default.yaml
  predictions_path: outputs/runs/phase1_smoke/predictions.jsonl
  item_catalog_path: outputs/runs/phase1_smoke/artifacts/processed_dataset/items.jsonl
