manifest:
  dataset: movielens_style_sampled_pilot
  split_strategy: leave_one_out
  candidate_strategy: sampled_fixed
  methods: [random, popularity, bm25, mf, sasrec, temporal_graph_encoder, time_graph_evidence, time_graph_evidence_dynamic]
  seeds: [0]
  metrics: [Recall@5, NDCG@5, MRR@5]
  output_dir: outputs/runs
  run_mode: pilot
  reportable: false
experiment:
  run_id: phase7_pilot_resource_check
  output_dir: outputs/runs
  overwrite: true
  run_mode: pilot
  seed: 0
  reportable: false
pilot_reportable: false
dataset:
  name: movielens_style_sampled_pilot
  adapter: movielens_style
  split_strategy: leave_one_out
  candidate_protocol: sampled_fixed
pilot:
  max_users: 200
  max_items: 1000
  max_interactions: 10000
  candidate_size: 100
  split_artifact: shared
  candidate_artifact: shared
evaluation:
  ks: [1, 5, 10]
  candidate_protocol: sampled_fixed
training:
  enable_lora_training: false
llm:
  provider: none
  allow_api_calls: false
