experiment:
  run_id: phase3b_api_micro
  output_dir: outputs/runs
  seed: 2026
  run_mode: diagnostic_api
  resume: false

source:
  phase2b_run_dir: outputs/runs/phase2b_movielens_diagnostics
  phase2b_config: configs/experiments/phase2b_movielens_diagnostics.yaml
  prepare_phase2b_if_missing: true

llm:
  config_path: configs/llm/openai_compatible.yaml

cache:
  enabled: true
  policy: read_write
  cache_dir: outputs/cache/llm

api_safety:
  max_api_calls: 125
  on_api_error: continue

evaluation:
  ks: [1, 3, 5]
  top_k: 5
  candidate_protocol: full_catalog

diagnostic:
  max_cases_per_group: 5
  max_total_cases: 25
  random_seed: 2026
  candidate_size: 10
  max_history_items: 20
  max_evidence_items: 6
  require_target_in_candidates: true
  min_transition_count: 0
  min_time_window_score: 0
  case_groups: [semantic_and_transition, semantic_only, transition_only, cross_category_transition, high_time_window_strength]
  prompt_variants: [history_only, history_with_order, history_with_time_buckets, history_with_transition_evidence, history_with_contrastive_evidence]
